<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.5億大老闆-女神觀測系統旗艦版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --rakuten: #8b0029; }
        body { background-color: #020617; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        
        /* 女神卡片樣式：白底、懸浮感、專業佈局 */
        .goddess-card { 
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }
        .goddess-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3); }
        .goddess-img { width: 100%; height: 320px; object-fit: cover; object-position: center 20%; border-bottom: 1px solid #eee; }
        
        /* 韓籍女神標籤 */
        .kr-label {
            position: absolute; top: 12px; right: 12px;
            background: linear-gradient(to right, #fbbf24, #f59e0b); color: black;
            padding: 4px 12px; border-radius: 999px; font-weight: 900; font-size: 11px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="text-white p-4 pb-20">
    <div class="max-w-7xl mx-auto">
        <header class="text-center py-10 mb-8 border-b border-slate-800 sticky top-0 bg-slate-950/90 backdrop-blur-sm z-50">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 via-orange-400 to-yellow-600 mb-2">資產 1.5 億大老闆專屬</h1>
            <p class="text-blue-300 text-sm mt-1">CPBL GODDESS MONITORING SYSTEM</p>
            
            <div class="flex flex-wrap justify-center gap-3 mt-8">
                <button onclick="showTeam('monkeys')" class="bg-[#8b0029] hover:bg-[#a00030] text-white px-8 py-3 rounded-full font-black shadow-lg">RAKUTEN Girls</button>
                <button onclick="showTeam('fubon')" class="bg-[#004a95] hover:bg-[#005bb5] text-white px-8 py-3 rounded-full font-black shadow-lg">FUBON Angels</button>
                <button onclick="showTeam('brothers')" class="bg-[#ffcc00] hover:bg-[#ffdd33] text-black px-8 py-3 rounded-full font-black shadow-lg">Passion Sisters</button>
            </div>
        </header>

        <div id="displayArea" class="bg-slate-900/80 rounded-[2rem] p-8 min-h-[700px]">
            <div id="welcomeMsg" class="text-center py-48 text-slate-600 font-bold italic text-3xl">Waiting for Boss's Order...</div>
            <div id="nameList" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 hidden"></div>
        </div>
    </div>

    <script>
        const girls = {
            'monkeys': [
                {n:'李晧禎', kr:true, img:'https://cdn-origin.cool-style.com.tw/cool/2023/11/S__63258674.jpg'},
                {n:'李多慧', kr:true, img:'https://img.ltn.com.tw/Upload/ent/page/800/2023/04/14/phpVdE7uM.jpg'},
                {n:'籃籃', kr:false, img:'https://img.ltn.com.tw/Upload/ent/page/800/2023/04/28/phptMv0T7.jpg'},
                {n:'若潼', kr:false, img:'https://cdn-origin.cool-style.com.tw/cool/2023/04/340323315_6164214233635749_7880998319692348574_n.jpg'},
                {n:'孟潔', kr:false, img:'https://img.ltn.com.tw/Upload/ent/page/800/2023/05/01/php1vO9N2.jpg'}
            ],
            'fubon': [
                {n:'李珠珢', kr:true, img:'https://img.ltn.com.tw/Upload/ent/page/800/2024/07/22/phpm67QWJ.jpg'},
                {n:'李雅英', kr:true, img:'https://cdn-origin.cool-style.com.tw/cool/2024/03/343204.jpg'},
                {n:'南珉貞', kr:true, img:'https://cdn-origin.cool-style.com.tw/cool/2024/03/S__38871004.jpg'},
                {n:'慈妹', kr:false, img:'https://img.ltn.com.tw/Upload/ent/page/800/2023/04/10/phpXh77a4.jpg'}
            ]
        };

        function showTeam(team) {
            document.getElementById('welcomeMsg').classList.add('hidden');
            const list = document.getElementById('nameList');
            list.classList.remove('hidden');
            list.innerHTML = girls[team].map(g => `
                <div class="goddess-card relative cursor-pointer" onclick="alert('大老闆選中了：${g.n}')">
                    ${g.kr ? '<div class="kr-label">KOREA</div>' : ''}
                    <img src="${g.img}" class="goddess-img" loading="lazy" onerror="this.src='https://via.placeholder.com/400x600?text=Wait+for+Boss'">
                    <div class="p-5 text-center bg-white">
                        <h3 class="text-xl font-bold text-slate-800 mb-1">${g.n}</h3>
                        <p class="text-xs text-slate-400 font-bold tracking-widest uppercase">IDOL SYSTEM</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
